// ---------- FORMATTERS ----------
const fmtBRL = (n) => n == null ? "—" : "R$ " + Number(n).toLocaleString("pt-BR", { maximumFractionDigits: 0 });

  if (n == null) return "—";

};

const fmtPctInt = (n) => n == null ? "—" : Math.round(n*100) + "%";

const relTime = (iso) => {
  const t = new Date(iso);
  const diffMs = TODAY - t;
  const mins = Math.floor(diffMs / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);
  if (mins < 60) return `há ${Math.max(1,mins)}min`;
  if (hours < 24) return `há ${hours}h`;
  if (days === 1) return "ontem";
  if (days < 7) return `há ${days}d`;
  if (days < 30) return `há ${Math.floor(days/7)}sem`;
  return `há ${Math.floor(days/30)}mes`;
};

// ---------- CURRENCY INPUT ----------
function CurrencyInput({ value, onChange, placeholder, style, className }) {
  const ref = React.useRef(null);
  const raw = (value === "" || value == null) ? "" : String(value).replace(/\D/g, "");
  const formatted = raw === "" ? "" : Number(raw).toLocaleString("pt-BR", { maximumFractionDigits: 0 });

  const handleChange = (e) => {
    const el = e.target;
    const digitsBeforeCursor = (el.value.slice(0, el.selectionStart).match(/\d/g) || []).length;
    const newRaw = el.value.replace(/\D/g, "");
    onChange(newRaw);
    requestAnimationFrame(() => {
      if (!ref.current) return;
      const newFmt = newRaw === "" ? "" : Number(newRaw).toLocaleString("pt-BR", { maximumFractionDigits: 0 });
      let count = 0, pos = newFmt.length;
      for (let i = 0; i < newFmt.length; i++) {
        if (/\d/.test(newFmt[i])) count++;
        if (count === digitsBeforeCursor) { pos = i + 1; break; }
      }
      ref.current.setSelectionRange(pos, pos);
    });
  };

  return (
    <input
      ref={ref}
      className={className || "gp-input mono"}
      type="text"
      inputMode="numeric"
      value={formatted}
      onChange={handleChange}
      placeholder={placeholder}
      style={style}
    />
  );
}

function MultiSelect({ options, values, onChange, placeholder, width }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const toggle = (v) => onChange(values.includes(v) ? values.filter(x => x !== v) : [...values, v]);
  const label = values.length === 0
    ? placeholder
    : values.length === 1
      ? (options.find(o => o.value === values[0])?.label || values[0])
      : `${values.length} selecionados`;
  return (
    <div className="relative" ref={ref} style={{ width }}>
      <button
        onClick={() => setOpen(o => !o)}
        className="gp-select w-full flex items-center justify-between gap-1"
        style={{ cursor: "pointer", paddingRight: 8 }}>
        <span className="truncate text-[12px]" style={{ color: values.length === 0 ? "var(--text-2)" : "var(--text)" }}>{label}</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div className="absolute right-0 z-50 mt-1 rounded-md p-1 scrollbar"
          style={{ background: "#fff", border: "1px solid var(--border)", boxShadow: "0 8px 24px rgba(20,30,60,.12)", minWidth: "100%", maxHeight: 220, overflowY: "auto" }}>
          {options.map(opt => (
            <label key={opt.value}
              className="flex items-center gap-2 px-3 py-2 rounded text-[12px] cursor-pointer hover:bg-[var(--surface-2)]"
              style={{ color: "var(--text)", userSelect: "none" }}>
              <input type="checkbox" checked={values.includes(opt.value)} onChange={() => toggle(opt.value)}
                style={{ accentColor: "#3B5279", cursor: "pointer" }} />
              {opt.label}
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

  const vol = (d) => d.ultimo_valor || 0;
  const [fStatuses, setFStatuses] = useState([]);

    const set = new Set(deals.map(d => d.created_at ? d.created_at.slice(0, 7) : null).filter(Boolean));
    return [...set].sort((a, b) => b.localeCompare(a));

  const filtered = deals.filter(d => {

    if (fMeses.length > 0 && (!d.created_at || !fMeses.includes(d.created_at.slice(0, 7)))) return false;
    return true;
  });
  const countMode = fStatuses.length === 0;

  const fmtTick  = countMode ? (v) => Number(v).toLocaleString('pt-BR') : (v) => `${Number(v).toLocaleString('pt-BR')}M`;
  const fmtTip   = countMode ? (v) => [Number(v).toLocaleString('pt-BR'), "Deals"] : (v) => [`R$ ${Number(v).toLocaleString('pt-BR')}M`, "Volume"];
  const fmtTipN  = countMode ? (v, n) => [Number(v).toLocaleString('pt-BR'), n] : (v, n) => [`R$ ${Number(v).toLocaleString('pt-BR')}M`, n];

  const total = filtered.length;
  const volumeNegoc = filtered.filter(d => d.status === "NEGOCIAÇÕES EM ANDAMENTO").reduce((s,d) => s + vol(d), 0);
  const volume = filtered.reduce((s,d) => s + vol(d), 0);
  const volumeFechadosMes = fMeses.length > 0
    ? filtered.filter(d => d.status === "CONDIÇÕES COMERCIAIS FECHADAS").reduce((s,d) => s + vol(d), 0)
    : filtered.filter(d => d.status === "CONDIÇÕES COMERCIAIS FECHADAS" && new Date(d.updated_at).getMonth() === TODAY.getMonth() && new Date(d.updated_at).getFullYear() === TODAY.getFullYear()).reduce((s,d) => s + vol(d), 0);

  // Deltas — meses selecionados vs meses anteriores (created_at), ou mês atual vs anterior (updated_at)
  const curM = TODAY.getMonth(), curY = TODAY.getFullYear();
  const prevM = curM === 0 ? 11 : curM - 1, prevY = curM === 0 ? curY - 1 : curY;
  const inMonth = (d, m, y) => { const dt = new Date(d.created_at); return dt.getMonth() === m && dt.getFullYear() === y; };
  const pctDelta = (curr, prev) => prev === 0 ? 0 : +((curr - prev) / prev * 100).toFixed(1);

  const prevMonthsForDelta = fMeses.map(ym => {
    const [y, m] = ym.split("-").map(Number);
    return m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2, "0")}`;
  });
  const deltaBase = fStatuses.length > 0 ? deals.filter(d => fStatuses.includes(d.status)) : deals;
  const inCur  = (d) => fMeses.length > 0 ? !!(d.created_at && fMeses.includes(d.created_at.slice(0,7))) : inMonth(d, curM, curY);
  const inPrev = (d) => fMeses.length > 0 ? !!(d.created_at && prevMonthsForDelta.includes(d.created_at.slice(0,7))) : inMonth(d, prevM, prevY);

  const deltaTotalDeals = pctDelta(
    deltaBase.filter(inCur).length,
    deltaBase.filter(inPrev).length
  );
  const deltaNegoc = pctDelta(
    deltaBase.filter(d => d.status === "NEGOCIAÇÕES EM ANDAMENTO" && inCur(d)).reduce((s,d) => s + vol(d), 0),
    deltaBase.filter(d => d.status === "NEGOCIAÇÕES EM ANDAMENTO" && inPrev(d)).reduce((s,d) => s + vol(d), 0)
  );
  const deltaVolume = pctDelta(
    deltaBase.filter(inCur).reduce((s,d) => s + vol(d), 0),
    deltaBase.filter(inPrev).reduce((s,d) => s + vol(d), 0)
  );
  const deltaFech = pctDelta(
    deltaBase.filter(d => d.status === "CONDIÇÕES COMERCIAIS FECHADAS" && inCur(d)).reduce((s,d) => s + vol(d), 0),
    deltaBase.filter(d => d.status === "CONDIÇÕES COMERCIAIS FECHADAS" && inPrev(d)).reduce((s,d) => s + vol(d), 0)
  );

  // 1. Distribuição por status (volume financeiro R$ M)
  const propostasMap = [
    { status: "NEGOCIAÇÕES EM ANDAMENTO",          label: "Negociação",   color: PALETTE.blue1 },
    { status: "CONDIÇÕES COMERCIAIS FECHADAS",     label: "Fechadas",     color: PALETTE.navy },
    { status: "OPORTUNIDADES DESCARTADAS",         label: "Descartadas",  color: PALETTE.gray1 },
    { status: "OPORTUNIDADES RECEBIDAS",          label: "Recebidas",    color: PALETTE.gray3 },
  ];
  const propostas = propostasMap.map(m => ({
    name: m.label,
    value: countMode
      ? filtered.filter(d => d.status === m.status).length
      : +(filtered.filter(d => d.status === m.status).reduce((s,d) => s + vol(d), 0) / 1_000_000).toFixed(1),
    color: m.color
  }));

  // 2. Volume por tipologia (R$ M)
  const tipologias = {};
  filtered.forEach(d => {
    const k = d.perfil_ativo || "OUTROS";
    tipologias[k] = (tipologias[k] || 0) + (countMode ? 1 : vol(d));
  });
  const volTipologia = Object.entries(tipologias)
    .map(([k, v]) => ({ name: k, value: countMode ? v : +(v/1_000_000).toFixed(1), color: TIPOLOGIA_COLORS[k] || PALETTE.gray3 }))
    .sort((a,b) => b.value - a.value);

  // 3. Forma de aquisição (R$ M) — Dinheiro / Cotas / Misto
  const aquisicaoBuckets = { "Dinheiro": 0, "Cotas": 0, "Misto": 0 };
  filtered.forEach(d => {
    const e = (d.estrategia || "").toUpperCase();
    let bucket = "Misto";
    if (e === "CASH") bucket = "Dinheiro";
    else if (e === "COTAS") bucket = "Cotas";
    else if (e === "CETIPADO" || !e) bucket = "Misto";
    aquisicaoBuckets[bucket] += (countMode ? 1 : vol(d));
  });
  const aquisicao = [
    { name: "Dinheiro", value: countMode ? aquisicaoBuckets["Dinheiro"] : +(aquisicaoBuckets["Dinheiro"]/1_000_000).toFixed(1), color: PALETTE.navy },
    { name: "Cotas",    value: countMode ? aquisicaoBuckets["Cotas"]    : +(aquisicaoBuckets["Cotas"]/1_000_000).toFixed(1),    color: PALETTE.blue3 },
    { name: "Misto",    value: countMode ? aquisicaoBuckets["Misto"]    : +(aquisicaoBuckets["Misto"]/1_000_000).toFixed(1),    color: PALETTE.cyan },
  ];
  const aquisicaoTotal = aquisicao.reduce((s,d) => s + d.value, 0);

  // Volume por UF — filtro global quando ativo, senão apenas "NEGOCIAÇÕES EM ANDAMENTO"
  const ufNegMap = {};
  ((fStatuses.length > 0 || fMeses.length > 0) ? filtered : deals.filter(d => d.status === "NEGOCIAÇÕES EM ANDAMENTO")).forEach(d => {
    const k = d.uf || "N/D";
    ufNegMap[k] = (ufNegMap[k] || 0) + (countMode ? 1 : vol(d));
  });
  const volUFNeg = Object.entries(ufNegMap)
    .map(([k, v]) => ({ name: k, value: countMode ? v : +(v/1_000_000).toFixed(1) }))
    .sort((a, b) => b.value - a.value);

  // 4. Deals originados por broker (R$ M)
  const brokers = {};
  filtered.forEach(d => {
    if (!d.broker_envolvido || !d.nome_broker) return;
    brokers[d.nome_broker] = (brokers[d.nome_broker] || 0) + 1;
  });
  const brokerData = Object.entries(brokers)
    .map(([k, v]) => ({ name: k, value: v }))
    .sort((a,b) => b.value - a.value);

  return (
    <div className="px-8 py-7">
      <div className="flex items-center justify-between mb-1">
        <h1 className="text-[20px]" style={{ fontWeight: 600, color: "var(--text)" }}>Dashboard</h1>
        <div className="flex items-center gap-3">
          <MultiSelect
            options={mesOpts.map(ym => { const [y,m]=ym.split("-"); return { value: ym, label: `${MONTH_NAMES_PT[+m-1]}/${y}` }; })}
            values={fMeses}
            onChange={setFMeses}
            placeholder="Mês — Todos"
            width={130}
          />
          <MultiSelect
            options={STATUS_ORDER.map(s => ({ value: s, label: STATUS_SHORT[s] || s }))}
            values={fStatuses}
            onChange={setFStatuses}
            placeholder="Status — Todos"
            width={200}
          />
          <div className="text-[12px]" style={{ color: "var(--text-2)" }}>
            <span className="mono">{TODAY.toLocaleDateString("pt-BR", { day: "numeric", month: "short", year: "numeric" })}</span> · visão geral do pipeline
          </div>
        </div>
      </div>
      <div className="text-[13px] mb-6" style={{ color: "var(--text-2)" }}>
        Indicadores consolidados de todos os ativos em pipeline ativo.
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-4 gap-4 mb-6">
        <KpiCard label="Total de Deals" value={total} color={PALETTE.navy} sub="ativos no pipeline" delta={deltaTotalDeals} />
        <KpiCard label="Em Negociação" value={fmtMillions(volumeNegoc)} color={PALETTE.blue1} sub="volume — negociações em andamento" delta={deltaNegoc} />
        <KpiCard label="Volume Total" value={fmtMillions(volume)} color={PALETTE.blue3} sub="soma do último valor enviado" delta={deltaVolume} />
        <KpiCard label="Fechados este mês" value={fmtMillions(volumeFechadosMes)} color={PALETTE.cyan} sub={fMeses.length > 0 ? `volume fechado · ${fMeses.map(ym => { const [y,m]=ym.split("-"); return MONTH_NAMES_PT[+m-1]+"/"+y; }).join(", ")}` : "volume fechado total"} delta={deltaFech} />
      </div>

      {/* Row 1: Propostas + Tipologia */}
      <div className="grid grid-cols-2 gap-4 mb-4">
        <ChartCard
          title="Distribuição de Propostas"
          subtitle={countMode ? "Número de deals por estágio" : "R$ Milhões por estágio"}>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={propostas} margin={{ top: 14, right: 12, bottom: 4, left: -10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E3E7EE" vertical={false} />
              <XAxis dataKey="name" tick={{ fill: "#6B7385", fontSize: 11 }} axisLine={{ stroke: "#D6DCE6" }} tickLine={false} />
              <YAxis tick={{ fill: "#6B7385", fontSize: 11, fontFamily: "DM Mono" }} axisLine={false} tickLine={false} tickFormatter={fmtTick} />
              <Tooltip cursor={{ fill: "rgba(59,82,121,0.06)" }} formatter={fmtTip} />
              <Bar dataKey="value" radius={[4,4,0,0]}>
                {propostas.map((e,i) => <Cell key={i} fill={e.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard
          title={countMode ? "Deals por Tipologia de Ativo" : "Volume por Tipologia de Ativo"}
          subtitle={countMode ? "Número de deals por tipologia" : "R$ Milhões por tipologia"}>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={volTipologia} layout="vertical" margin={{ top: 8, right: 24, bottom: 4, left: 8 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E3E7EE" horizontal={false} />
              <XAxis type="number" tick={{ fill: "#6B7385", fontSize: 11, fontFamily: "DM Mono" }} axisLine={{ stroke: "#D6DCE6" }} tickLine={false} tickFormatter={fmtTick} />
              <YAxis type="category" dataKey="name" tick={{ fill: "#1B2233", fontSize: 11 }} axisLine={false} tickLine={false} width={80} />
              <Tooltip cursor={{ fill: "rgba(59,82,121,0.06)" }} formatter={fmtTip} />
              <Bar dataKey="value" radius={[0,4,4,0]}>
                {volTipologia.map((e,i) => <Cell key={i} fill={e.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      {/* Row 2: Aquisição (donut) + Volume por UF em negociação */}
      <div className="grid grid-cols-2 gap-4 mb-4">
        <ChartCard
          title="Forma de Aquisição"
          subtitle={countMode ? "Deals — Dinheiro, Cotas ou Misto" : "R$ Milhões — Dinheiro, Cotas ou Misto"}>
          <div className="flex items-center gap-4" style={{ height: 260 }}>
            <div style={{ width: "55%", height: "100%" }}>
              <ResponsiveContainer>
                <PieChart>
                  <Pie data={aquisicao} dataKey="value" nameKey="name" innerRadius={62} outerRadius={100} paddingAngle={2} stroke="#FFFFFF" strokeWidth={2}>
                    {aquisicao.map((e,i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={fmtTipN} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div className="flex-1 flex flex-col gap-3">
              {aquisicao.map(p => {
                const pct = aquisicaoTotal > 0 ? Math.round(p.value/aquisicaoTotal*100) : 0;
                return (
                  <div key={p.name} className="flex items-center gap-3 text-[12px]">
                    <span className="w-2.5 h-2.5 rounded-sm" style={{ background: p.color }} />
                    <span style={{ color: "var(--text)" }} className="flex-1">{p.name}</span>
                    <span className="mono" style={{ color: "var(--text-2)" }}>
                      {countMode ? Number(p.value).toLocaleString('pt-BR') : `R$ ${Number(p.value).toLocaleString('pt-BR')}M`}
                    </span>
                    <span className="mono" style={{ color: p.color, width: 38, textAlign: "right", fontWeight: 600 }}>{pct}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        </ChartCard>

        <ChartCard
          title={countMode ? "Deals por UF" : "Volume por UF"}
          subtitle={countMode ? "Número de deals — Negociações em andamento" : "R$ Milhões — Negociações em andamento"}>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={volUFNeg} margin={{ top: 8, right: 12, bottom: 4, left: -10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E3E7EE" vertical={false} />
              <XAxis dataKey="name" tick={{ fill: "#1B2233", fontSize: 11 }} axisLine={{ stroke: "#D6DCE6" }} tickLine={false} />
              <YAxis tick={{ fill: "#6B7385", fontSize: 11, fontFamily: "DM Mono" }} axisLine={false} tickLine={false} tickFormatter={fmtTick} />
              <Tooltip cursor={{ fill: "rgba(59,82,121,0.06)" }} formatter={fmtTip} />
              <Bar dataKey="value" fill={PALETTE.blue1} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      {/* Row 3: Brokers */}
      <div className="grid grid-cols-1 gap-4">
        <ChartCard
          title="Deals Originados por Broker"
          subtitle="Número de deals por broker">
          {brokerData.length === 0 ? (
            <div className="flex items-center justify-center text-[12px]" style={{ height: 200, color: "var(--text-2)" }}>
              Nenhum deal originado via broker no momento.
            </div>
          ) : (
            <ResponsiveContainer width="100%" height={Math.max(220, 60 + brokerData.length * 38)}>
              <BarChart data={brokerData} layout="vertical" margin={{ top: 8, right: 64, bottom: 4, left: 8 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E3E7EE" horizontal={false} />
                <XAxis type="number" tick={{ fill: "#6B7685", fontSize: 11, fontFamily: "DM Mono" }} axisLine={{ stroke: "#D6DCE6" }} tickLine={false} tickFormatter={fmtTick} />
                <YAxis type="category" dataKey="name" tick={{ fill: "#1B2233", fontSize: 12 }} axisLine={false} tickLine={false} width={150} />
                <Tooltip cursor={{ fill: "rgba(59,82,121,0.06)" }} formatter={fmtTip} />
                <Bar dataKey="value" fill={PALETTE.blue3} radius={[0,4,4,0]} />
              </BarChart>
            </ResponsiveContainer>
          )}
        </ChartCard>
      </div>
    </div>
  );
}

function ChartCard({ title, subtitle, legend, children }) {
  return (
    <div className="rounded-lg p-5" style={{ background: "var(--surface)", border: "1px solid var(--border)", boxShadow: "0 1px 2px rgba(20,30,60,0.03)" }}>
      <div className="flex items-start justify-between mb-4">
        <div>
          <div className="text-[14px]" style={{ fontWeight: 600, color: "var(--text)" }}>{title}</div>
          {subtitle && <div className="text-[11px] mt-0.5" style={{ color: "var(--text-2)" }}>{subtitle}</div>}
        </div>
        {legend && <div className="flex items-center gap-3">{legend}</div>}
      </div>
      {children}
    </div>
  );
}

function LegendDot({ color, label }) {
  return (
    <div className="flex items-center gap-1.5 text-[11px]" style={{ color: "var(--text-2)" }}>
      <span className="w-2.5 h-2.5 rounded-sm" style={{ background: color }} />
      {label}

  );
}

const EXPORT_COLS = [
  { key: "id",                    label: "ID" },
  { key: "produto",               label: "Produto" },
  { key: "status",                label: "Status" },
  { key: "responsavel",           label: "Responsável" },
  { key: "perfil_ativo",          label: "Perfil do Ativo" },
  { key: "endereco",              label: "Endereço" },
  { key: "cidade",                label: "Cidade" },
  { key: "uf",                    label: "UF" },
  { key: "area_locavel",          label: "ABL (m²)" },
  { key: "aluguel_mensal",        label: "Aluguel Mensal" },
  { key: "ultimo_valor",          label: "Último Valor" },
  { key: "yield_ultima_proposta", label: "Yield" },
  { key: "estrategia",            label: "Estratégia" },
  { key: "veiculo_oferta",        label: "Veículo da Oferta" },
  { key: "perfil_vendedor",       label: "Perfil Vendedor" },
  { key: "broker_envolvido",      label: "Broker Envolvido" },
  { key: "nome_broker",           label: "Nome Broker" },
  { key: "principais_locatarios", label: "Principais Locatários" },
  { key: "proximos_passos",       label: "Próximos Passos" },
  { key: "historico_negociacoes", label: "Histórico de Negociações" },
  { key: "updated_at",            label: "Atualizado em" },
];

function exportDeals(rows, format) {
  const data = rows.map(d => {
    const row = {};
    EXPORT_COLS.forEach(({ key, label }) => {
      let v = d[key];
      if (key === "broker_envolvido") v = v === true ? "Sim" : v === false ? "Não" : "";
      if (key === "yield_ultima_proposta" && v != null) v = `${(v * 100).toFixed(2).replace(".", ",")}%`;
      row[label] = v ?? "";
    });
    return row;
  });

  const wb = window.XLSX.utils.book_new();
  const ws = window.XLSX.utils.json_to_sheet(data);
  window.XLSX.utils.book_append_sheet(wb, ws, "Deals");

  const filename = `pipeline_${new Date().toISOString().slice(0,10)}`;
  if (format === "csv") {
    const csv = window.XLSX.utils.sheet_to_csv(ws);
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = filename + ".csv"; a.click();
  } else {
    window.XLSX.writeFile(wb, filename + ".xlsx");
  }
}

function ExportButton({ rows }) {
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 px-3.5 py-2 rounded text-[12px] font-medium"
        style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6" }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Exportar ({rows.length})
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && (
        <div className="absolute right-0 mt-1 z-50 rounded-md p-1" style={{ background: "#fff", border: "1px solid #D6DCE6", boxShadow: "0 8px 24px rgba(20,30,60,.10)", minWidth: 140 }}>
          {[["xlsx","Excel (.xlsx)"],["csv","CSV (.csv)"]].map(([fmt, label]) => (
            <div key={fmt} onClick={() => { exportDeals(rows, fmt); setOpen(false); }}

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DealsPage({ deals, setDeals, openDrawer, selectedId, openModal }) {
  const [q, setQ] = useState("");
  const [fStatus, setFStatus] = useState([]);
  const [fResp, setFResp] = useState([]);
  const [fPerfil, setFPerfil] = useState([]);
  const [fCidade, setFCidade] = useState([]);
  const [fUF, setFUF] = useState([]);
  const [fBroker, setFBroker] = useState([]);
  const [fMes, setFMes] = useState([]);

  const cidadeOpts = useMemo(() => [...new Set(deals.map(d => d.cidade).filter(Boolean))].sort(), [deals]);
  const brokerOpts = useMemo(() => [...new Set(deals.map(d => d.nome_broker).filter(Boolean))].sort(), [deals]);
  const mesOpts = useMemo(() => {
    const set = new Set(deals.map(d => d.created_at ? d.created_at.slice(0, 7) : null).filter(Boolean));
    return [...set].sort((a, b) => b.localeCompare(a));
  }, [deals]);
  const ufOpts = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

  const filtered = useMemo(() => {
    return deals
      .filter(d => {
        if (q) {
          const s = q.toLowerCase();
          if (!((d.produto||"").toLowerCase().includes(s) || (d.endereco||"").toLowerCase().includes(s))) return false;
        }
        if (fStatus.length > 0 && !fStatus.includes(d.status)) return false;
        if (fResp.length > 0 && !fResp.includes(d.responsavel)) return false;
        if (fPerfil.length > 0 && !fPerfil.includes(d.perfil_ativo)) return false;
        if (fCidade.length > 0 && !fCidade.includes(d.cidade)) return false;
        if (fUF.length > 0 && !fUF.includes(d.uf)) return false;
        if (fBroker.length > 0 && !fBroker.includes(d.nome_broker)) return false;
        if (fMes.length > 0 && (!d.created_at || !fMes.includes(d.created_at.slice(0, 7)))) return false;
        return true;
      })
      .sort((a, b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status));
  }, [deals, q, fStatus, fResp, fPerfil, fCidade, fUF, fBroker, fMes]);

  return (
    <div className="px-8 py-7">
      <div className="flex items-baseline justify-between mb-5">
        <div>
          <h1 className="text-[20px]" style={{ fontWeight: 600 }}>Deals</h1>
          <div className="text-[13px] mt-1" style={{ color: "var(--text-2)" }}>
            {filtered.length} de {deals.length} deals · clique em uma linha para detalhar

// Componente recursivo: renderiza um item (pasta ou arquivo) e seus filhos
function DriveItem({ item, depth, dealId, authFetch, onRefresh }) {
  const [creating, setCreating] = React.useState(false);
  const [newName, setNewName]   = React.useState("");
  const [saving, setSaving]     = React.useState(false);
  const [open, setOpen]         = React.useState(depth < 2); // pastas de 1º nível já abertas

  const isFolder = item.type === "folder";
  const children = item.children || [];
  const indent   = depth * 14;

  const submitFolder = async () => {
    if (!newName.trim()) return;
    setSaving(true);
    try {
      await authFetch(`/api/deals/${dealId}/drive-folder`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ parent_id: item.id, name: newName.trim() }),
      });
      setNewName(""); setCreating(false);
      onRefresh();
    } catch (e) { alert("Erro ao criar pasta: " + e.message); }
    finally { setSaving(false); }
  };

  if (!isFolder) return (
    <a href={item.link} target="_blank" rel="noopener noreferrer"
      className="flex items-center gap-2 px-3 py-1.5 text-[12px]"
      style={{ marginLeft: indent, textDecoration: "none", color: "var(--text)", borderTop: "1px solid var(--border)" }}>
      <span style={{ color: "#8592AA" }}><IcoFile /></span>
      <span className="flex-1 truncate">{item.name}</span>
      <span style={{ color: "#8592AA" }}><IcoExt /></span>
    </a>
  );

  return (
    <div>
      {/* Cabeçalho da pasta */}
      <div className="flex items-center gap-2 px-3 py-2 cursor-pointer"
        style={{ marginLeft: indent, background: depth === 0 ? "var(--surface-2)" : "rgba(238,241,246,0.5)",
                 borderTop: depth > 0 ? "1px solid var(--border)" : "none" }}
        onClick={() => setOpen(o => !o)}>
        <span style={{ color: "#8592AA", transform: open ? "rotate(0deg)" : "rotate(-90deg)", transition: "transform 0.15s", display: "inline-flex" }}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
        <span style={{ color: "#8592AA" }}><IcoFolder /></span>
        <a href={item.link} target="_blank" rel="noopener noreferrer"
          className="flex-1 text-[11px] font-medium uppercase tracking-[0.06em]"
          style={{ color: "var(--text-2)", textDecoration: "none" }}
          onClick={e => e.stopPropagation()}>
          {item.name}
        </a>
        {/* Botão nova subpasta */}
        <button className="text-[10px] px-2 py-0.5 rounded font-medium"
          style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6", flexShrink: 0 }}
          onClick={e => { e.stopPropagation(); setCreating(c => !c); setOpen(true); }}>
          + pasta
        </button>
      </div>

      {/* Conteúdo expandível */}
      {open && (
        <div>
          {/* Formulário criar subpasta */}
          {creating && (
            <div className="flex items-center gap-2 px-3 py-2" style={{ marginLeft: indent + 14, borderTop: "1px solid var(--border)", background: "var(--surface)" }}>
              <input autoFocus value={newName} onChange={e => setNewName(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") submitFolder(); if (e.key === "Escape") setCreating(false); }}
                placeholder="Nome da pasta…"
                className="flex-1 text-[12px] px-2 py-1 rounded"
                style={{ border: "1px solid var(--border)", outline: "none", background: "var(--surface)" }} />
              <button onClick={submitFolder} disabled={saving}
                className="text-[11px] px-2 py-1 rounded font-medium"
                style={{ background: "#3B5279", color: "#fff" }}>
                {saving ? "…" : "Criar"}
              </button>
              <button onClick={() => setCreating(false)} className="text-[11px] px-1" style={{ color: "var(--text-2)" }}>✕</button>
            </div>
          )}
          {/* Filhos */}
          {children.length === 0 && !creating && (
            <div className="px-3 py-1.5 text-[11px]"
              style={{ marginLeft: indent + 14, color: "var(--text-2)", borderTop: "1px solid var(--border)" }}>
              Vazio
            </div>
          )}
          {children.map(child => (
            <DriveItem key={child.id} item={child} depth={depth + 1} dealId={dealId} authFetch={authFetch} onRefresh={onRefresh} />
          ))}
        </div>
      )}
    </div>
  );
}

function FilesTab({ deal, authFetch }) {
  const [data, setData]     = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [creating, setCreating] = React.useState(false); // nova pasta na raiz
  const [newName, setNewName]   = React.useState("");
  const [saving, setSaving]     = React.useState(false);

  const dealId = deal && deal.id;

  const load = () => {
    if (!dealId) return;
    setLoading(true);
    authFetch(`/api/deals/${dealId}/drive-files`)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  };

  React.useEffect(() => { load(); }, [dealId]);

  const submitRootFolder = async () => {
    if (!newName.trim() || !data || !data.main_id) return;
    setSaving(true);
    try {
      await authFetch(`/api/deals/${dealId}/drive-folder`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ parent_id: data.main_id, name: newName.trim() }),
      });
      setNewName(""); setCreating(false);
      load();
    } catch (e) { alert("Erro ao criar pasta: " + e.message); }
    finally { setSaving(false); }
  };

  if (!dealId) return (
    <div className="text-[12px] px-3 py-3 rounded-lg mt-1" style={{ color: "var(--text-2)", background: "var(--surface-2)", border: "1px solid var(--border)" }}>
      As pastas do Google Drive serão criadas automaticamente ao salvar o deal.
    </div>
  );

  if (loading && !data) return (
    <div className="text-[12px] px-3 py-3" style={{ color: "var(--text-2)" }}>Carregando arquivos…</div>
  );

  if (!data || !data.main_link) return (
    <div className="text-[12px] px-3 py-3 rounded-lg mt-1" style={{ color: "var(--text-2)", background: "var(--surface-2)", border: "1px solid var(--border)" }}>
      Pasta do Drive ainda não criada para este deal.
    </div>
  );

  const items = data.items || [];

  return (
    <div className="flex flex-col gap-2">
      {/* Pasta principal */}
      <div className="flex items-center gap-2">
        <a href={data.main_link} target="_blank" rel="noopener noreferrer"
          className="flex-1 flex items-center gap-3 px-4 py-3 rounded-lg"
          style={{ background: "rgba(59,82,121,0.06)", border: "1px solid #D6DCE6", textDecoration: "none", color: "#3B5279" }}>
          <IcoFolder />
          <span className="flex-1 text-[12px] font-semibold">📁 {deal.produto || "Pasta do Deal"}</span>
          <IcoExt />
        </a>
        <button onClick={() => { setCreating(c => !c); setNewName(""); }}
          className="text-[11px] px-3 py-2 rounded font-medium"
          style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6", whiteSpace: "nowrap" }}>
          + Pasta
        </button>
      </div>

      {/* Form nova pasta na raiz */}
      {creating && (
        <div className="flex items-center gap-2 px-3 py-2 rounded-lg" style={{ border: "1px solid var(--border)", background: "var(--surface)" }}>
          <input autoFocus value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") submitRootFolder(); if (e.key === "Escape") setCreating(false); }}
            placeholder="Nome da nova pasta…"
            className="flex-1 text-[12px] px-2 py-1 rounded"
            style={{ border: "1px solid var(--border)", outline: "none" }} />
          <button onClick={submitRootFolder} disabled={saving}
            className="text-[11px] px-3 py-1.5 rounded font-medium"
            style={{ background: "#3B5279", color: "#fff" }}>
            {saving ? "…" : "Criar"}
          </button>
          <button onClick={() => setCreating(false)} style={{ color: "var(--text-2)" }}>✕</button>
        </div>
      )}

      {/* Árvore de pastas e arquivos */}
      {items.length === 0 ? (
        <div className="text-[12px] px-3 py-2 rounded-lg" style={{ color: "var(--text-2)", background: "var(--surface-2)", border: "1px solid var(--border)" }}>
          Nenhuma pasta ou arquivo encontrado.
        </div>
      ) : (
        <div className="rounded-lg overflow-hidden" style={{ border: "1px solid var(--border)" }}>
          {items.map(item => (
            <DriveItem key={item.id} item={item} depth={0} dealId={dealId} authFetch={authFetch} onRefresh={load} />
          ))}
        </div>
      )}
    </div>
  );
}

function HistoricoNegTab({ deal, authFetch }) {
  const [items, setItems]           = useState([]);
  const [contraMap, setContraMap]   = useState({}); // { offer_id: [contrapropostas] }
  const [loading, setLoading]       = useState(true);
  const [editing, setEditing]       = useState(null);   // null | "new" | item
  const [currentLado, setCurrentLado] = useState("GUARDIAN");
  const [form, setForm]             = useState({});
  const [saving, setSaving]         = useState(false);
  const [cEditing, setCEditing]     = useState(null); // { offerId, item: "new"|obj }
  const [cForm, setCForm]           = useState({});
  const [cSaving, setCSaving]       = useState(false);

  const load = () => {
    Promise.all([
      authFetch(`/api/deals/${deal.id}/historico`).then(r => r.json()),
      authFetch(`/api/deals/${deal.id}/contrapropostas`).then(r => r.json()),
    ]).then(([hist, contra]) => {
      setItems(Array.isArray(hist) ? hist : []);
      const map = {};
      (Array.isArray(contra) ? contra : []).forEach(c => {
        if (!map[c.offer_id]) map[c.offer_id] = [];
        map[c.offer_id].push(c);
      });
      setContraMap(map);
      setLoading(false);
    }).catch(() => setLoading(false));
  };

  useEffect(() => { load(); }, [deal.id]);

  const fmtDate = (iso) => {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
  };

  const openNew = (lado) => { setForm({...EMPTY_HIST}); setEditing("new"); setCurrentLado(lado); };
  const openEdit = (item) => {
    setForm({
      ...item,
      valor_aquisicao: item.valor_aquisicao ?? "",
      cap:             item.cap != null ? +(item.cap * 100).toFixed(4) : "",
      entrada_pct:     item.entrada_pct != null ? +(item.entrada_pct * 100).toFixed(2) : "",
    });
