                    className="flex items-center gap-1 text-[11px] px-2.5 py-1.5 rounded self-start"
                    style={{ background: "rgba(47,201,255,0.08)", color: "#1A9FC0", border: "1px solid rgba(47,201,255,0.25)" }}>
                    <IconPlus size={11}/> Contraproposta
                  </button>
                )}
                {cEditing?.item === "new" && cEditing?.offerId === item.id && <ContraForm offerId={item.id} />}
              </div>
            </div>
            {isEditing && <InlineForm label="Editar Registro" />}
          </React.Fragment>
        );
      })}

      {/* Form novo registro Guardian */}
      {editing === "new" && currentLado === "GUARDIAN" && <InlineForm label="Novo Registro" />}
      {!editing && (
        <button onClick={() => openNew("GUARDIAN")} className="flex items-center gap-1.5 text-[12px] px-3 py-2 rounded font-medium self-start mt-1"
          style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6" }}>
          <IconPlus size={13}/> Adicionar Registro
        </button>
      )}

      {/* PROPOSTA CONTRAPARTE — seção abaixo */}
      {(contraparteItems.length > 0 || (editing === "new" && currentLado === "CONTRAPARTE")) && (
        <div className="flex flex-col gap-3 mt-3 pt-3" style={{ borderTop: "1px solid var(--border)" }}>
          <div className="flex items-center gap-2 pb-2" style={{ borderBottom: "2px solid #4E95D9" }}>
            <div className="w-2 h-2 rounded-full" style={{ background: "#4E95D9" }} />
            <span className="text-[12px] font-semibold uppercase tracking-wide" style={{ color: "#4E95D9" }}>Proposta Contraparte</span>
          </div>
          <ItemTimeline colItems={contraparteItems} lado="CONTRAPARTE" />
        </div>
      )}
      {!editing && (
        <button onClick={() => openNew("CONTRAPARTE")} className="flex items-center gap-1.5 text-[12px] px-3 py-2 rounded font-medium self-start"
          style={{ background: "#EEF1F6", color: "#4E95D9", border: "1px solid #C7D9F0" }}>
          <IconPlus size={13}/> Proposta Contraparte
        </button>
      )}
    </div>
  );
}

// ---------- PORTFOLIO TAB ----------
const TIPOLOGIA_OPTS = Object.keys(TIPOLOGIA_COLORS).filter(k => k !== "OUTROS");

function PortfolioTab({ deal, authFetch }) {
  const [items, setItems]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);   // null | "new" | item object
  const [form, setForm]       = useState({});
  const [saving, setSaving]   = useState(false);

  const load = async () => {
    setLoading(true);
    const res = await authFetch(`/api/deals/${deal.id}/portfolio`);
    const data = await res.json();
    setItems(Array.isArray(data) ? data : []);
    setLoading(false);
  };

  useEffect(() => { load(); }, [deal.id]);

  const openNew = () => {
    setForm({ perfil: "", imovel: "", aluguel: "", endereco: "", cidade: "", uf: "" , abl: "" });
    setEditing("new");
  };

  const openEdit = (item) => {
    setForm({ ...item, aluguel: item.aluguel ?? "", abl: item.abl ?? "" });
    setEditing(item);
  };

  const cancel = () => { setEditing(null); setForm({}); };

  const save = async () => {
    setSaving(true);
    const payload = {
      perfil:   form.perfil   || null,
      imovel:   form.imovel   || null,
      aluguel:  form.aluguel  !== "" ? Number(form.aluguel)  : null,
      endereco: form.endereco || null,
      cidade:   form.cidade   || null,
      uf:       form.uf       || null,
      abl:      form.abl      !== "" ? Number(form.abl)      : null,
    };
    if (editing === "new") {
      await authFetch(`/api/deals/${deal.id}/portfolio`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
      });
    } else {
      await authFetch(`/api/portfolio/${editing.id}`, {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
      });
    }
    setSaving(false);
    cancel();
    load();
  };

  const remove = async (item) => {
    if (!confirm(`Remover "${item.imovel || "este imóvel"}"?`)) return;
    await authFetch(`/api/portfolio/${item.id}`, { method: "DELETE" });
    load();
  };

  const totalAluguel = items.reduce((s, i) => s + (i.aluguel || 0), 0);
  const totalAbl     = items.reduce((s, i) => s + (i.abl     || 0), 0);

  const UF_OPTS = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

  if (loading) return <div className="text-[12px] py-4" style={{ color: "var(--text-2)" }}>Carregando portfólio…</div>;

  return (
    <div className="flex flex-col gap-4">
      {/* Summary */}
      {items.length > 0 && (
        <div className="grid grid-cols-3 gap-2">
          <div className="p-3 rounded-lg text-center" style={{ background: "var(--surface-2)", border: "1px solid var(--border)" }}>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: "var(--text-2)" }}>Imóveis</div>
            <div className="mono font-semibold" style={{ fontSize: 18 }}>{items.length}</div>
          </div>
          <div className="p-3 rounded-lg text-center" style={{ background: "var(--surface-2)", border: "1px solid var(--border)" }}>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: "var(--text-2)" }}>Aluguel Total</div>
            <div className="mono font-semibold text-[12px]">{fmtBRL(totalAluguel)}</div>
          </div>
          <div className="p-3 rounded-lg text-center" style={{ background: "var(--surface-2)", border: "1px solid var(--border)" }}>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: "var(--text-2)" }}>ABL Total</div>
            <div className="mono font-semibold text-[12px]">{fmtArea(totalAbl)}</div>
          </div>
        </div>
      )}

      {/* Reusable inline form */}
      {(() => {
        const InlineForm = ({ label }) => (
          <div className="rounded-lg p-4 flex flex-col gap-3" style={{ background: "rgba(59,82,121,0.04)", border: "1px solid #D6DCE6" }}>
            <div className="text-[11px] font-semibold uppercase tracking-wide" style={{ color: "#3B5279" }}>{label}</div>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2">
                <label className="gp-label">Nome do Imóvel</label>
                <input className="gp-input" value={form.imovel || ""} onChange={e => setForm(f => ({...f, imovel: e.target.value}))} placeholder="Ex.: Galpão Cajamar A" />
              </div>
              <div>
                <label className="gp-label">Tipologia</label>
                <select className="gp-select" value={form.perfil || ""} onChange={e => setForm(f => ({...f, perfil: e.target.value}))}>
                  <option value="">Selecione…</option>
                  {TIPOLOGIA_OPTS.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label className="gp-label">Aluguel Mensal</label>
                <CurrencyInput value={form.aluguel ?? ""} onChange={v => setForm(f => ({...f, aluguel: v}))} placeholder="0" />
              </div>
              <div>
                <label className="gp-label">Cidade</label>
                <input className="gp-input" value={form.cidade || ""} onChange={e => setForm(f => ({...f, cidade: e.target.value}))} placeholder="Ex.: São Paulo" />
              </div>
              <div>
                <label className="gp-label">UF</label>
                <select className="gp-select" value={form.uf || ""} onChange={e => setForm(f => ({...f, uf: e.target.value}))}>
                  <option value="">UF</option>
                  {UF_OPTS.map(u => <option key={u}>{u}</option>)}
                </select>
              </div>
              <div className="col-span-2">
                <label className="gp-label">Endereço</label>
                <input className="gp-input" value={form.endereco || ""} onChange={e => setForm(f => ({...f, endereco: e.target.value}))} placeholder="Rua, número" />
              </div>
              <div className="col-span-2">
                <label className="gp-label">ABL (m²)</label>
                <CurrencyInput value={form.abl ?? ""} onChange={v => setForm(f => ({...f, abl: v}))} placeholder="0" />
              </div>
            </div>
            <div className="flex items-center gap-2 justify-end mt-1">
              <button onClick={cancel} className="px-3 py-1.5 rounded text-[12px]" style={{ color: "var(--text-2)" }}>Cancelar</button>
              <button onClick={save} disabled={saving} className="px-4 py-1.5 rounded text-[12px] font-medium" style={{ background: "#3B5279", color: "#fff" }}>
                {saving ? "Salvando…" : "Salvar"}
              </button>
            </div>
          </div>
        );

        return (
          <div className="flex flex-col gap-2">
            {items.map(item => (
              <React.Fragment key={item.id}>
                <div className="rounded-lg p-3" style={{ background: "var(--surface-2)", border: "1px solid var(--border)" }}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-semibold text-[13px] truncate">{item.imovel || "—"}</span>
                        {item.perfil && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded font-medium"
                            style={{ background: `${TIPOLOGIA_COLORS[item.perfil] || "#8592AA"}18`, color: TIPOLOGIA_COLORS[item.perfil] || "#8592AA", border: `1px solid ${TIPOLOGIA_COLORS[item.perfil] || "#8592AA"}30` }}>
                            {item.perfil}
                          </span>
                        )}
                      </div>
                      <div className="text-[11px] mt-1" style={{ color: "var(--text-2)" }}>
                        {[item.cidade, item.uf].filter(Boolean).join(" / ")}
                        {item.endereco && <span> · {item.endereco}</span>}
                      </div>
                      <div className="flex items-center gap-3 mt-2 flex-wrap">
                        {item.aluguel != null && (
                          <span className="mono text-[11px]" style={{ color: "var(--text)" }}>{fmtBRL(item.aluguel)}<span style={{ color: "var(--text-2)" }}>/mês</span></span>
                        )}
                        {item.abl != null && (
                          <span className="mono text-[11px]" style={{ color: "var(--text-2)" }}>{fmtArea(item.abl)}</span>
                        )}
                      </div>
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                      <button onClick={() => editing && editing.id === item.id ? cancel() : openEdit(item)}
                        className="p-1.5 rounded hover:bg-[var(--border)]"
                        style={{ color: editing && editing.id === item.id ? "#DC2626" : "#3B5279" }} title="Editar">
                        <IconEdit size={13}/>
                      </button>
                      <button onClick={() => remove(item)} className="p-1.5 rounded hover:bg-[var(--border)]" style={{ color: "#DC2626" }} title="Remover">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>
                {editing && editing !== "new" && editing.id === item.id && (
                  <InlineForm label="Editar Imóvel" />
                )}
              </React.Fragment>
            ))}

            {items.length === 0 && editing !== "new" && (
              <div className="text-[12px] py-3 px-3 rounded" style={{ color: "var(--text-2)", background: "var(--surface-2)" }}>
                Nenhum imóvel cadastrado neste portfólio.
              </div>
            )}

            {editing === "new" && <InlineForm label="Novo Imóvel" />}
          </div>
        );
      })()}

      {/* Add button */}
      {!editing && (
        <button onClick={openNew} className="flex items-center gap-1.5 text-[12px] px-3 py-2 rounded font-medium self-start"
          style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6" }}>
          <IconPlus size={13}/> Adicionar Imóvel
        </button>
      )}
    </div>
  );
}

// ---------- DRAWER ----------
function StatusEditor({ status, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div className="relative" ref={ref}>
      <StatusBadge status={status} onClick={() => setOpen(o => !o)} hint="Clique para alterar status" />
      {open && (
        <div className="absolute mt-1 z-50 status-pop rounded-md p-1 min-w-[200px]">
          {STATUS_ORDER.map(s => (
            <div
              key={s}
              onClick={() => { onChange(s); setOpen(false); }}
              className="flex items-center gap-2 px-2 py-1.5 rounded text-[12px] cursor-pointer hover:bg-[var(--surface-2)]"
              style={{ color: STATUS[s] }}>
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: STATUS[s] }} />
              <span style={{ color: s === status ? STATUS[s] : "var(--text)" }}>{s}</span>
              {s === status && <span className="ml-auto text-[10px]" style={{ color: STATUS[s] }}>●</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="text-[10px] uppercase tracking-[0.08em] mb-1" style={{ color: "var(--text-2)" }}>{label}</div>
      <div className="text-[13px]" style={{ color: "var(--text)" }}>{children}</div>
    </div>
  );
}

function Drawer({ deal, onClose, onChange, onEdit, onSave, authFetch }) {
  const [tab, setTab] = useState("ident");
  const isPortfolio = deal.perfil_ativo === "PORTFOLIO";
  if (!deal) return null;

  const updateField = (key, val) => {
    const updated = { ...deal, [key]: val, updated_at: new Date().toISOString() };
    onChange(updated);
    if (key === "status" || key === "broker_envolvido") onSave(updated);
  };

  return (
    <>
      <div className="fixed inset-0 z-40" style={{ background: "rgba(0,0,0,0.35)" }} onClick={onClose} />
      <aside
        className="fixed right-0 top-0 z-50 h-screen flex flex-col drawer-enter-active"
        style={{ width: 780, background: "var(--surface)", borderLeft: "1px solid var(--border)", overflow: "hidden" }}>
        {/* header */}
        <div className="px-5 pt-5 pb-4 flex-shrink-0" style={{ borderBottom: "1px solid var(--border)" }}>
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-[0.1em]" style={{ color: "var(--text-2)" }}>{deal.perfil_ativo}</div>
              <div className="text-[16px] mt-0.5 leading-tight" style={{ fontWeight: 600 }}>{deal.produto}</div>
            </div>
            <button onClick={onClose} className="p-1 rounded hover:bg-[var(--surface-2)]" style={{ color: "var(--text-2)" }}><IconClose size={16}/></button>
          </div>
          <div className="flex items-center gap-2 mt-3">
            <StatusEditor status={deal.status} onChange={(s) => updateField("status", s)} />
            <RespBadge r={deal.responsavel} />
            <span className="text-[11px] mono ml-auto" style={{ color: "var(--text-2)" }}>{relTime(deal.updated_at)}</span>
          </div>
        </div>

        {/* tabs */}
        <div className="flex flex-shrink-0 scrollbar" style={{ borderBottom: "1px solid var(--border)", overflowX: "auto", overflowY: "hidden" }}>
          {[
            ["ident","Ident."],
            ["fin","Financeiro"],
            ["contra","Contra."],
            ["hist","Histórico"],
            ["negoc","Negoc."],
            ...(isPortfolio ? [["port","Portfólio"]] : []),
            ["docs","Arquivos"],
          ].map(([k,l]) => (
            <div key={k} className={`tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}
              style={{ padding: "8px 9px", fontSize: 11, whiteSpace: "nowrap", flexShrink: 0 }}>{l}</div>
          ))}
        </div>

        <div className="px-5 py-5 flex flex-col gap-4 flex-1 scrollbar" style={{ overflowY: "auto" }}>
          {tab === "ident" && (
            <>
              <Field label="Perfil do Ativo">{deal.perfil_ativo || "—"}</Field>
              <Field label="Endereço">{deal.endereco || "—"}</Field>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Área Locável"><span className="mono">{fmtArea(deal.area_locavel)}</span></Field>
                <Field label="Ocupação"><span className="mono">{fmtPctInt(deal.ocupacao)}</span></Field>
              </div>
              <Field label="Principais Locatários">{deal.principais_locatarios || "—"}</Field>
            </>
          )}

          {tab === "fin" && (
            <>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Aluguel Mensal"><span className="mono">{fmtBRL(deal.aluguel_mensal)}</span></Field>
                <Field label="Yield Última Proposta">
                  <span className="mono" style={{ color: deal.yield_ultima_proposta && deal.yield_ultima_proposta < 0.09 ? "#D9534F" : deal.yield_ultima_proposta && deal.yield_ultima_proposta >= 0.105 ? "#1F9D55" : "var(--text)" }}>
                    {fmtPct(deal.yield_ultima_proposta)}
                  </span>
                </Field>
              </div>
              <Field label="Preço Pedido"><span className="mono" style={{ fontSize: 16 }}>{fmtBRL(deal.preco_pedido)}</span></Field>
              <Field label="Último Valor"><span className="mono" style={{ fontSize: 16 }}>{fmtBRL(deal.ultimo_valor)}</span></Field>
              {deal.preco_pedido && deal.ultimo_valor && (
                <div className="text-[11px] p-3 rounded" style={{ background: "rgba(59,82,121,0.06)", border: "1px solid #D6DCE6", color: "var(--text-2)" }}>
                  Diferença pedido vs. último: <span className="mono" style={{ color: "#3B5279", fontWeight: 600 }}>
                    {fmtPct((deal.ultimo_valor - deal.preco_pedido) / deal.preco_pedido)}
                  </span>
                </div>
              )}
            </>
          )}

          {tab === "contra" && (
            <>
              <Field label="Perfil Vendedor">{deal.perfil_vendedor || "—"}</Field>
              <div className="flex items-center justify-between" style={{ borderTop: "1px solid var(--border)", paddingTop: 12 }}>
                <span className="text-[12px]">Broker envolvido</span>
                <div className={`gp-toggle ${deal.broker_envolvido ? "on" : ""}`} onClick={() => updateField("broker_envolvido", !deal.broker_envolvido)}>
                  <span className="dot"></span>
                </div>
              </div>
              {deal.broker_envolvido && <Field label="Nome do Broker">{deal.nome_broker || "—"}</Field>}
              <div className="grid grid-cols-2 gap-4">
                <Field label="Estratégia">{deal.estrategia || "—"}</Field>
                <Field label="Veículo da Oferta">{deal.veiculo_oferta || "—"}</Field>
              </div>
            </>
          )}

          {tab === "hist" && (
            <>
              <div>
                <div className="gp-label">Próximos Passos</div>
                <textarea
                  className="gp-textarea scrollbar"
                  rows={4}
                  value={deal.proximos_passos || ""}
                  onChange={e => updateField("proximos_passos", e.target.value)}
                  placeholder="Descreva os próximos passos…"
                />
              </div>
              <div>
                <div className="gp-label">Histórico de Negociações</div>
                <textarea
                  className="gp-textarea scrollbar"
                  rows={6}
                  value={deal.historico_negociacoes || ""}
                  onChange={e => updateField("historico_negociacoes", e.target.value)}
                  placeholder="Registre o histórico das negociações…"
                />
              </div>
            </>
          )}

          {tab === "negoc" && <HistoricoNegTab deal={deal} authFetch={authFetch} />}

          {tab === "port" && isPortfolio && <PortfolioTab deal={deal} authFetch={authFetch} />}

          {tab === "docs" && <FilesTab deal={deal} authFetch={authFetch} />}
        </div>

        <div className="px-5 py-3 flex items-center gap-2 flex-shrink-0" style={{ borderTop: "1px solid var(--border)" }}>
          <button onClick={() => onEdit(deal)} className="flex items-center gap-1.5 px-3 py-2 rounded text-[12px] font-medium"
            style={{ background: "#3B5279", color: "#FFFFFF" }}>
            <IconEdit size={13}/> Editar Deal
          </button>
          <button onClick={() => onSave(deal)} className="px-3 py-2 rounded text-[12px] font-medium"
            style={{ background: "#EEF1F6", color: "#3B5279", border: "1px solid #D6DCE6" }}>
            Salvar
          </button>
          <button onClick={onClose} className="px-3 py-2 rounded text-[12px]" style={{ color: "var(--text-2)" }}>Fechar</button>
        </div>
      </aside>
    </>
  );
}

// ---------- MODAL ----------
function FormRow({ label, children, required, suffix, prefix }) {
  return (
    <div>
      <label className="gp-label">{label}{required && <span style={{ color: "#3B5279" }}> *</span>}</label>
      <div className="relative">
        {prefix && <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-[12px] mono" style={{ color: "var(--text-2)" }}>{prefix}</span>}
        {children}
        {suffix && <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-[12px] mono" style={{ color: "var(--text-2)" }}>{suffix}</span>}
      </div>
    </div>
  );
}

function DealModal({ initial, onClose, onSave, authFetch }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(initial || {
    produto: "", perfil_ativo: "", endereco: "", area_locavel: "", ocupacao: "",
    principais_locatarios: "",
    aluguel_mensal: "", preco_pedido: "", ultimo_valor: "", yield_ultima_proposta: "",
    perfil_vendedor: "", broker_envolvido: false, nome_broker: "",
    estrategia: "", veiculo_oferta: "",
    status: "DESCRIÇÃO RECEBIDA", responsavel: "CM",
    proximos_passos: "", historico_negociacoes: "",
  });
  const [tab, setTab] = useState("ident");
  const [error, setError] = useState("");
  const [pendingFiles, setPendingFiles] = useState([]); // [{folderKey, folderLabel, file, id}] — only used for new deals

  const [autoHint, setAutoHint] = useState(null); // "yield" | "ultimo" | null

  const upd = (k, v) => {
    setForm(f => {
      const next = { ...f, [k]: v };

      // Auto-calculation between aluguel_mensal, ultimo_valor and yield_ultima_proposta
      const aluguel   = parseFloat(k === "aluguel_mensal"        ? v : f.aluguel_mensal);
      const ultimo    = parseFloat(k === "ultimo_valor"           ? v : f.ultimo_valor);
      const yieldPct  = parseFloat(k === "yield_ultima_proposta"  ? v : f.yield_ultima_proposta);

      const okAluguel = !isNaN(aluguel)  && aluguel  > 0;
      const okUltimo  = !isNaN(ultimo)   && ultimo   > 0;
      const okYield   = !isNaN(yieldPct) && yieldPct > 0;

      if (k === "ultimo_valor") {
        if (okAluguel && okUltimo) {
          next.yield_ultima_proposta = +((aluguel * 12 / ultimo) * 100).toFixed(2);
          setAutoHint("yield");
        }
      } else if (k === "yield_ultima_proposta") {
        if (okAluguel && okYield) {
          next.ultimo_valor = Math.round(aluguel * 12 / (yieldPct / 100));
          setAutoHint("ultimo");
        }
      } else if (k === "aluguel_mensal") {
        if (okAluguel && okUltimo) {
          next.yield_ultima_proposta = +((aluguel * 12 / ultimo) * 100).toFixed(2);
          setAutoHint("yield");
        } else if (okAluguel && okYield) {
          next.ultimo_valor = Math.round(aluguel * 12 / (yieldPct / 100));
          setAutoHint("ultimo");
        }
      }

      return next;
    });
  };

  const numOrNull = (v) => v === "" || v == null ? null : Number(v);

  const submit = () => {
    if (!form.produto || !form.produto.trim()) {
      setError("O campo Produto é obrigatório.");
      setTab("ident");
      return;
    }
    const payload = {
      ...form,
      area_locavel: numOrNull(form.area_locavel),
      ocupacao: form.ocupacao === "" || form.ocupacao == null ? null : Number(form.ocupacao) / 100,
      aluguel_mensal: numOrNull(form.aluguel_mensal),
      preco_pedido: numOrNull(form.preco_pedido),
      ultimo_valor: numOrNull(form.ultimo_valor),
      yield_ultima_proposta: form.yield_ultima_proposta === "" || form.yield_ultima_proposta == null ? null : Number(form.yield_ultima_proposta) / 100,
      updated_at: new Date().toISOString(),
    };
    onSave(payload, isEdit ? [] : pendingFiles);
  };

  // for editing, convert stored decimals to display percentages
  const ocupacaoDisplay = isEdit && typeof initial.ocupacao === "number" ? Math.round(initial.ocupacao * 100) : form.ocupacao;
  const yieldDisplay = isEdit && typeof initial.yield_ultima_proposta === "number" ? (initial.yield_ultima_proposta * 100).toFixed(1) : form.yield_ultima_proposta;

  // initialize converted values once
  useEffect(() => {
    if (isEdit) {
      setForm(f => ({
        ...f,
        ocupacao: typeof initial.ocupacao === "number" ? Math.round(initial.ocupacao * 100) : "",
        yield_ultima_proposta: typeof initial.yield_ultima_proposta === "number" ? +(initial.yield_ultima_proposta * 100).toFixed(1) : "",
      }));
    }
    // eslint-disable-next-line
  }, []);

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center modal-overlay" style={{ background: "rgba(0,0,0,0.6)" }} onClick={onClose}>
      <div
        className="modal-card rounded-lg flex flex-col"
        style={{ width: 640, maxHeight: "88vh", background: "var(--surface)", border: "1px solid var(--border)" }}
        onClick={e => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--border)" }}>
          <div>
            <div className="text-[11px] uppercase tracking-[0.1em]" style={{ color: "#3B5279", fontWeight: 600 }}>{isEdit ? "Edição" : "Cadastro"}</div>
            <div className="text-[16px] mt-0.5" style={{ fontWeight: 600 }}>
              {isEdit ? `Editar Deal — ${initial.produto}` : "Novo Deal"}
            </div>
          </div>
          <button onClick={onClose} className="p-1 rounded hover:bg-[var(--surface-2)]" style={{ color: "var(--text-2)" }}><IconClose size={16}/></button>
        </div>

        <div className="flex" style={{ borderBottom: "1px solid var(--border)" }}>
          {[["ident","Identificação"],["fin","Financeiro"],["contra","Contraparte"],["acom","Acompanhamento"],["arq","Arquivos"]].map(([k,l]) => (
            <div key={k} className={`tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)} style={{ fontSize: 11 }}>
              {l}
            </div>
          ))}
        </div>

        <div className="px-6 py-5 overflow-y-auto scrollbar" style={{ flex: 1 }}>
          {tab === "ident" && (
            <div className="grid grid-cols-2 gap-4">
              <div className="col-span-2">
                <FormRow label="Produto" required>
                  <input className="gp-input" value={form.produto} onChange={e => { upd("produto", e.target.value); setError(""); }} placeholder="Ex.: Galpão Cajamar — Bloco A" />
                </FormRow>
              </div>
              <FormRow label="Perfil do Ativo">
                <select className="gp-select" value={form.perfil_ativo} onChange={e => upd("perfil_ativo", e.target.value)}>
                  <option value="">Selecione…</option>
                  {PERFIL_OPTS.map(p => <option key={p}>{p}</option>)}
                </select>
              </FormRow>
              <div className="col-span-2">
                <FormRow label="Endereço">
                  <input className="gp-input" value={form.endereco || ""} onChange={e => upd("endereco", e.target.value)} placeholder="Rua, número" />
                </FormRow>
              </div>
              <FormRow label="Cidade">
                <input className="gp-input" value={form.cidade || ""} onChange={e => upd("cidade", e.target.value)} placeholder="Ex.: São Paulo" />
              </FormRow>
              <FormRow label="UF">
                <select className="gp-select" value={form.uf || ""} onChange={e => upd("uf", e.target.value)}>
                  <option value="">Selecione…</option>
                  {["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"].map(u => <option key={u}>{u}</option>)}
                </select>
              </FormRow>
              <FormRow label="Área Locável" suffix="m²">
                <CurrencyInput value={form.area_locavel ?? ""} onChange={v => upd("area_locavel", v)} placeholder="0" style={{ paddingRight: 32 }}/>
              </FormRow>
              <FormRow label="Ocupação" suffix="%">
                <input className="gp-input mono" type="number" min="0" max="100" value={form.ocupacao ?? ""} onChange={e => upd("ocupacao", e.target.value)} placeholder="0" style={{ paddingRight: 32 }}/>
              </FormRow>
              <div className="col-span-2">
                <FormRow label="Principais Locatários">
                  <input className="gp-input" value={form.principais_locatarios} onChange={e => upd("principais_locatarios", e.target.value)} placeholder="Ex.: Amazon, Mercado Livre" />
                </FormRow>
              </div>
            </div>
          )}

          {tab === "fin" && (
            <div className="grid grid-cols-2 gap-4">
              <FormRow label="Aluguel Mensal" prefix="R$">
                <CurrencyInput value={form.aluguel_mensal ?? ""} onChange={v => upd("aluguel_mensal", v)} placeholder="0" style={{ paddingLeft: 38 }}/>
              </FormRow>
              <div>
                <label className="gp-label" style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  Yield Última Proposta
                  {autoHint === "yield" && (
                    <span className="mono" style={{ fontSize: 9, background: "rgba(47,201,255,0.15)", color: "#2FC9FF", border: "1px solid rgba(47,201,255,0.4)", borderRadius: 4, padding: "1px 5px", fontWeight: 600, letterSpacing: "0.04em" }}>AUTO</span>
                  )}
                </label>
                <div className="relative">
                  <input className="gp-input mono" type="number" step="0.01" value={form.yield_ultima_proposta ?? ""} onChange={e => { setAutoHint(null); upd("yield_ultima_proposta", e.target.value); }} placeholder="0,00" style={{ paddingRight: 32 }}/>
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-[12px] mono" style={{ color: "var(--text-2)" }}>%</span>
                </div>
                <div className="text-[10px] mt-1" style={{ color: "var(--text-2)" }}>(aluguel × 12) ÷ último valor</div>
              </div>
              <FormRow label="Preço Pedido" prefix="R$">
                <CurrencyInput value={form.preco_pedido ?? ""} onChange={v => upd("preco_pedido", v)} placeholder="0" style={{ paddingLeft: 38 }}/>
              </FormRow>
              <div>
                <label className="gp-label" style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  Último Valor
                  {autoHint === "ultimo" && (
                    <span className="mono" style={{ fontSize: 9, background: "rgba(47,201,255,0.15)", color: "#2FC9FF", border: "1px solid rgba(47,201,255,0.4)", borderRadius: 4, padding: "1px 5px", fontWeight: 600, letterSpacing: "0.04em" }}>AUTO</span>
                  )}
                </label>
                <div className="relative">
                  <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-[12px] mono" style={{ color: "var(--text-2)" }}>R$</span>
                  <CurrencyInput value={form.ultimo_valor ?? ""} onChange={v => { setAutoHint(null); upd("ultimo_valor", v); }} placeholder="0" style={{ paddingLeft: 38 }}/>
                </div>
                <div className="text-[10px] mt-1" style={{ color: "var(--text-2)" }}>(aluguel × 12) ÷ yield</div>
              </div>
            </div>
          )}

          {tab === "contra" && (
            <div className="grid grid-cols-2 gap-4">
              <FormRow label="Perfil do Vendedor">
                <select className="gp-select" value={form.perfil_vendedor} onChange={e => upd("perfil_vendedor", e.target.value)}>
                  <option value="">Selecione…</option>
                  {VENDEDOR_OPTS.map(p => <option key={p}>{p}</option>)}
                </select>
              </FormRow>
              <div className="flex items-end">
                <div className="flex-1">
                  <div className="gp-label">Broker Envolvido</div>
                  <div className="flex items-center gap-3 h-[36px]">
                    <div className={`gp-toggle ${form.broker_envolvido ? "on" : ""}`} onClick={() => upd("broker_envolvido", !form.broker_envolvido)}>
                      <span className="dot"></span>
                    </div>
                    <span className="text-[12px]" style={{ color: "var(--text-2)" }}>{form.broker_envolvido ? "Sim" : "Não"}</span>
                  </div>
                </div>
              </div>
              {form.broker_envolvido && (
                <div className="col-span-2">
                  <FormRow label="Nome do Broker">
                    <input className="gp-input" value={form.nome_broker || ""} onChange={e => upd("nome_broker", e.target.value.toUpperCase())} placeholder="Ex.: JLL, CBRE, CUSHMAN" />
                  </FormRow>
                </div>
              )}
              <FormRow label="Estratégia">
                <select className="gp-select" value={form.estrategia} onChange={e => upd("estrategia", e.target.value)}>
                  <option value="">Selecione…</option>
                  {ESTRATEGIA_OPTS.map(p => <option key={p}>{p}</option>)}
                </select>
              </FormRow>
              <FormRow label="Veículo da Oferta">
                <select className="gp-select" value={form.veiculo_oferta} onChange={e => upd("veiculo_oferta", e.target.value)}>
                  <option value="">Selecione…</option>
                  {VEICULO_OPTS.map(p => <option key={p}>{p}</option>)}
                </select>
              </FormRow>
            </div>
          )}

          {tab === "acom" && (
            <div className="grid grid-cols-2 gap-4">
              <FormRow label="Status">
                <select className="gp-select" value={form.status} onChange={e => upd("status", e.target.value)}>
                  {STATUS_ORDER.map(s => <option key={s}>{s}</option>)}
                </select>
              </FormRow>
              <FormRow label="Responsável">
                <select className="gp-select" value={form.responsavel} onChange={e => upd("responsavel", e.target.value)}>
                  {RESP_OPTS.map(s => <option key={s}>{s}</option>)}
                </select>
              </FormRow>
              <div className="col-span-2">
                <FormRow label="Próximos Passos">
                  <textarea className="gp-textarea scrollbar" rows={3} value={form.proximos_passos} onChange={e => upd("proximos_passos", e.target.value)} placeholder="Quais os próximos passos para esse deal?" />
                </FormRow>
              </div>
              <div className="col-span-2">
                <FormRow label="Histórico de Negociações">
                  <textarea className="gp-textarea scrollbar" rows={4} value={form.historico_negociacoes} onChange={e => upd("historico_negociacoes", e.target.value)} placeholder="Registre os marcos da negociação…" />
                </FormRow>
              </div>
            </div>
          )}

          {tab === "arq" && (
            <FilesTab deal={isEdit ? initial : null} authFetch={authFetch} />
          )}
        </div>

        <div className="px-6 py-4 flex items-center justify-between" style={{ borderTop: "1px solid var(--border)" }}>
          <div className="text-[11px]" style={{ color: error ? "#D9534F" : "var(--text-2)" }}>
            {error || "Apenas o campo Produto é obrigatório."}
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="px-3 py-2 rounded text-[12px]" style={{ color: "var(--text-2)" }}>Cancelar</button>
            <button onClick={submit} className="px-4 py-2 rounded text-[12px] font-medium" style={{ background: "#3B5279", color: "#FFFFFF" }}>
              Salvar Deal
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- LOGIN ----------
function LoginScreen() {
  const [step, setStep]       = useState("email");
  const [email, setEmail]     = useState("");
  const [otp, setOtp]         = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");

  const sendOTP = async () => {
    if (!email.trim()) { setError("Digite seu e-mail."); return; }
    setLoading(true); setError("");
    const { error: e } = await _supa.auth.signInWithOtp({ email: email.trim(), options: { shouldCreateUser: false } });
    if (e) setError(e.message.includes("not allowed") ? "E-mail não cadastrado. Fale com o administrador." : e.message);
    else setStep("otp");
    setLoading(false);
  };

  const verifyOTP = async () => {
    if (!otp.trim()) { setError("Digite o código recebido."); return; }
    setLoading(true); setError("");
    const { error: e } = await _supa.auth.verifyOtp({ email: email.trim(), token: otp.trim(), type: "email" });
    if (e) setError("Código inválido ou expirado. Tente novamente.");
    setLoading(false);
  };

  return (
    <div className="flex items-center justify-center min-h-screen" style={{ background: "var(--bg)" }}>
      <div className="rounded-xl p-8" style={{ width: 400, background: "var(--surface)", border: "1px solid var(--border)", boxShadow: "0 8px 40px rgba(20,30,60,0.10)" }}>
        <div className="mb-8 text-center">
          <div className="text-[28px] italic" style={{ fontWeight: 700, color: "#3B5279" }}>Guardian</div>
          <div className="text-[11px] tracking-[0.2em] mt-0.5" style={{ color: "#2FC9FF" }}>PIPELINE</div>
        </div>

        {step === "email" ? (
          <>
            <div className="mb-1" style={{ fontSize: 15, fontWeight: 600 }}>Entrar</div>
            <div className="mb-5 text-[13px]" style={{ color: "var(--text-2)" }}>Digite seu e-mail e enviaremos um código de acesso.</div>
            <label className="gp-label">E-mail</label>
            <input className="gp-input mb-4" type="email" placeholder="seu@email.com"
              value={email} onChange={e => { setEmail(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && sendOTP()} autoFocus />
            {error && <div className="mb-3 text-[12px] px-3 py-2 rounded" style={{ background: "#FEF2F2", color: "#DC2626", border: "1px solid #FECACA" }}>{error}</div>}
            <button onClick={sendOTP} disabled={loading} className="w-full py-2.5 rounded text-[13px] font-medium"
              style={{ background: "#3B5279", color: "#fff", opacity: loading ? 0.7 : 1 }}>
              {loading ? "Enviando…" : "Enviar código"}
            </button>
          </>
        ) : (
          <>
            <div className="mb-1" style={{ fontSize: 15, fontWeight: 600 }}>Verifique seu e-mail</div>
            <div className="mb-5 text-[13px]" style={{ color: "var(--text-2)" }}>
              Código enviado para <span style={{ color: "var(--text)", fontWeight: 500 }}>{email}</span>.
            </div>
            <label className="gp-label">Código de 8 dígitos</label>
            <input className="gp-input mono mb-4" type="text" inputMode="numeric" maxLength={8} placeholder="00000000"
              value={otp} onChange={e => { setOtp(e.target.value.replace(/\D/g, "")); setError(""); }}
              onKeyDown={e => e.key === "Enter" && verifyOTP()} autoFocus
              style={{ fontSize: 20, letterSpacing: "0.25em", textAlign: "center" }} />
            {error && <div className="mb-3 text-[12px] px-3 py-2 rounded" style={{ background: "#FEF2F2", color: "#DC2626", border: "1px solid #FECACA" }}>{error}</div>}
            <button onClick={verifyOTP} disabled={loading} className="w-full py-2.5 rounded text-[13px] font-medium mb-3"
              style={{ background: "#3B5279", color: "#fff", opacity: loading ? 0.7 : 1 }}>
              {loading ? "Verificando…" : "Entrar"}
            </button>
            <button onClick={() => { setStep("email"); setOtp(""); setError(""); }}
              className="w-full py-2 text-[12px]" style={{ color: "var(--text-2)" }}>
              ← Usar outro e-mail
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ---------- APP ----------
function App({ session }) {
  const authFetch = (url, opts = {}) => fetch(url, {
    ...opts,
    headers: { "Authorization": `Bearer ${session.access_token}`, ...(opts.headers || {}) },
  });

  const [view, setView] = useState("dashboard");
  const [deals, setDeals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [drawerId, setDrawerId] = useState(null);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  useEffect(() => {
    authFetch("/api/deals")
      .then(r => r.ok ? r.json() : [])
      .then(data => { setDeals(Array.isArray(data) ? data : []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const drawerDeal = deals.find(d => d.id === drawerId) || null;

  const openDrawer = (id) => setDrawerId(id);
  const closeDrawer = () => setDrawerId(null);
  const openModal = (deal) => setModal(deal ? { mode: "edit", deal } : { mode: "new" });

  const handleDealChange = (updated) => {
    setDeals(ds => ds.map(d => d.id === updated.id ? updated : d));
  };

  const handleDrawerSave = (deal) => {
    authFetch(`/api/deals/${deal.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(deal),
    })
      .then(r => r.ok ? r.json() : null)
      .then(saved => saved && setDeals(ds => ds.map(d => d.id === saved.id ? saved : d)))
      .catch(console.error);
  };

  const handleSave = (payload, pendingFiles = []) => {
    if (modal.mode === "edit") {
      authFetch(`/api/deals/${payload.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      })
        .then(r => r.ok ? r.json() : null)
        .then(saved => {
          if (!saved) return;
          setDeals(ds => ds.map(d => d.id === saved.id ? saved : d));
          setDrawerId(saved.id);
          showToast("Deal atualizado com sucesso");
        })
        .catch(console.error);
    } else {
      authFetch("/api/deals", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      })
        .then(r => r.ok ? r.json() : null)
        .then(async saved => {
          if (!saved) return;
          setDeals(ds => [saved, ...ds]);
          setDrawerId(saved.id);
          if (pendingFiles.length > 0) {
            for (const pf of pendingFiles) {
              const path = `${pf.folderKey}/${saved.id}/${pf.file.name}`;
              await _supa.storage.from(STORAGE_BUCKET).upload(path, pf.file, { upsert: true });
            }
          }
          showToast("Deal cadastrado com sucesso");
        })
        .catch(console.error);
    }
    setModal(null);
  };

  const handleLogout = async () => { await _supa.auth.signOut(); };

  if (loading) {
    return (
      <div className="flex items-center justify-center min-h-screen" style={{ color: "var(--text-2)", fontSize: 14 }}>
        Carregando deals…
      </div>
    );
  }

  return (
    <div className="flex min-h-screen">
      <Sidebar view={view} setView={setView} onLogout={handleLogout} userEmail={session.user.email} />
      <main className="flex-1 min-w-0">
        {view === "dashboard" && <DashboardPage deals={deals} />}
        {view === "deals" && (
          <DealsPage
            deals={deals}
            setDeals={setDeals}
            openDrawer={openDrawer}
            selectedId={drawerId}
            openModal={openModal}
          />
        )}
      </main>

      {drawerDeal && view === "deals" && (
        <Drawer
          deal={drawerDeal}
          onClose={closeDrawer}
          onChange={handleDealChange}
          onEdit={(d) => openModal(d)}
          onSave={handleDrawerSave}
          authFetch={authFetch}
        />
      )}

      {modal && (
        <DealModal
          initial={modal.mode === "edit" ? modal.deal : null}
          onClose={() => setModal(null)}
          onSave={handleSave}
          authFetch={authFetch}
        />
      )}

      {toast && <Toast message={toast} />}
    </div>
  );
}

// ---------- ROOT (auth gate) ----------
const _DEV_SKIP_AUTH = false; // login ativo

function Root() {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    if (_DEV_SKIP_AUTH) { setSession({ access_token: "dev", user: { email: "dev@local" } }); return; }
    _supa.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: { subscription } } = _supa.auth.onAuthStateChange((_e, s) => setSession(s ?? null));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return (
      <div className="flex items-center justify-center min-h-screen" style={{ color: "var(--text-2)", fontSize: 14 }}>
        Carregando…
      </div>
    );
  }
  if (!session) return <LoginScreen />;
  return <App session={session} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
